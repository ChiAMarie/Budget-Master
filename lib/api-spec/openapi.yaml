openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Personal Budget Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Source accounts
  - name: transactions
    description: Immutable transaction ledger
  - name: categories
    description: Spending taxonomy
  - name: budgets
    description: Budget targets per scenario
  - name: summary
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all active accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update editable account fields (name, institution, last4)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories ordered by tier and sort_order
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: flow_type
          in: query
          required: false
          description: "Filter by flow type: spend | income | card_payment | transfer | fee | investment | savings"
          schema:
            type: ["string", "null"]
        - name: month
          in: query
          required: false
          description: "Filter by month (YYYY-MM)"
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found

  /transactions/{id}/category:
    patch:
      operationId: recategorizeTransaction
      tags: [transactions]
      summary: Set or update the category for a transaction (the only permitted transaction mutation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionCategoryInput"
      responses:
        "200":
          description: Updated transaction_category row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionCategory"
        "404":
          description: Transaction not found

  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: List budget targets for a scenario with actual spend for the current calendar month
      parameters:
        - name: scenario
          in: query
          required: false
          description: "month1 or stretch (defaults to month1)"
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Budget rows with actual spend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetRow"

  /summary/overview:
    get:
      operationId: getSummaryOverview
      tags: [summary]
      summary: Monthly spend (flow_type=spend) and income (flow_type=income) totals
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Overview summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewSummary"

  /summary/spending-by-category:
    get:
      operationId: getSpendingByCategory
      tags: [summary]
      summary: Spend breakdown by category (flow_type=spend) for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Spending by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"

  /summary/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [summary]
      summary: Monthly income vs spend trend for the last 6 months
      responses:
        "200":
          description: Monthly trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrend"

  /summary/budget-vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [summary]
      summary: Budget targets vs actual spend for the current month
      parameters:
        - name: scenario
          in: query
          required: false
          description: "month1 or stretch (defaults to month1)"
          schema:
            type: ["string", "null"]
        - name: month
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Budget vs actual
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetVsActual"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Account:
      type: object
      required: [id, name, type, active, created_at]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        institution: { type: ["string", "null"] }
        last4: { type: ["string", "null"] }
        active: { type: boolean }
        created_at: { type: string, format: date-time }

    AccountUpdate:
      type: object
      properties:
        name: { type: string }
        institution: { type: ["string", "null"] }
        last4: { type: ["string", "null"] }

    Category:
      type: object
      required: [id, name, tier, type, counts_toward_runrate]
      properties:
        id: { type: integer }
        name: { type: string }
        tier: { type: integer }
        type: { type: string }
        counts_toward_runrate: { type: boolean }
        sort_order: { type: ["integer", "null"] }
        created_at: { type: string, format: date-time }

    Transaction:
      type: object
      required: [id, account_id, txn_date, description, amount, flow_type, is_pending, dedup_hash, imported_at]
      properties:
        id: { type: integer }
        account_id: { type: integer }
        account_name: { type: ["string", "null"] }
        txn_date: { type: string, format: date }
        posted_date: { type: ["string", "null"], format: date }
        description: { type: string }
        amount: { type: number }
        flow_type: { type: string }
        is_pending: { type: boolean }
        dedup_hash: { type: string }
        source_file: { type: ["string", "null"] }
        imported_at: { type: string, format: date-time }
        category_id: { type: ["integer", "null"] }
        category_name: { type: ["string", "null"] }
        category_source: { type: ["string", "null"] }

    TransactionCategoryInput:
      type: object
      required: [category_id]
      properties:
        category_id: { type: integer }

    TransactionCategory:
      type: object
      required: [transaction_id, category_id, source, updated_at]
      properties:
        transaction_id: { type: integer }
        category_id: { type: integer }
        source: { type: string }
        rule_id: { type: ["integer", "null"] }
        updated_at: { type: string, format: date-time }

    BudgetRow:
      type: object
      required: [id, category_id, category_name, tier, scenario, amount, actual_spent]
      properties:
        id: { type: integer }
        category_id: { type: integer }
        category_name: { type: string }
        tier: { type: integer }
        scenario: { type: string }
        amount: { type: number }
        actual_spent: { type: number }

    OverviewSummary:
      type: object
      required: [monthly_spend, monthly_income, net, transaction_count, month]
      properties:
        monthly_spend: { type: number }
        monthly_income: { type: number }
        net: { type: number }
        transaction_count: { type: integer }
        month: { type: string }

    CategorySpending:
      type: object
      required: [category_id, category_name, amount, percentage]
      properties:
        category_id: { type: integer }
        category_name: { type: string }
        amount: { type: number }
        percentage: { type: number }

    MonthlyTrend:
      type: object
      required: [month, income, spend, net]
      properties:
        month: { type: string }
        income: { type: number }
        spend: { type: number }
        net: { type: number }

    BudgetVsActual:
      type: object
      required: [category_id, category_name, tier, scenario, budget_limit, actual_spent, remaining, percentage_used]
      properties:
        category_id: { type: integer }
        category_name: { type: string }
        tier: { type: integer }
        scenario: { type: string }
        budget_limit: { type: number }
        actual_spent: { type: number }
        remaining: { type: number }
        percentage_used: { type: number }
